
<style>
  :root {
    --logo-green-1: #2D6A35;
    --logo-green-2: #4A9B54;
    --logo-green-3: #7CC E85;
    --logo-blue-1: #1B5E8C;
    --logo-blue-2: #3A8FC4;
    --logo-blue-3: #7BBFE0;
    --logo-gold: #C8922A;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --logo-green-1: #5BBD68;
      --logo-green-2: #7ED48A;
      --logo-green-3: #A8E8B0;
      --logo-blue-1: #5EB0E8;
      --logo-blue-2: #8CCFF5;
      --logo-blue-3: #B8E5FA;
      --logo-gold: #E8B84B;
    }
  }

  .logo-wrap {
    padding: 2.5rem 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2.5rem;
  }

  .logo-variant {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
  }

  .variant-label {
    font-size: 11px;
    color: var(--color-text-tertiary);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-family: var(--font-mono);
  }

  .logo-lockup {
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: transform 0.2s;
  }

  .logo-lockup:hover { transform: scale(1.02); }

  .logo-text-group {
    display: flex;
    flex-direction: column;
    line-height: 1;
  }

  .logo-wordmark {
    font-family: var(--font-sans);
    font-weight: 500;
    font-size: 28px;
    color: var(--color-text-primary);
    letter-spacing: 0.15em;
  }

  .logo-tagline {
    font-family: var(--font-sans);
    font-weight: 400;
    font-size: 10px;
    color: var(--color-text-tertiary);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .divider {
    width: 100%;
    max-width: 560px;
    height: 1px;
    background: var(--color-border-tertiary);
  }

  .icon-grid {
    display: flex;
    gap: 2rem;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
  }

  .icon-variant {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .icon-bg-dark {
    background: #0D1F0F;
    border-radius: 16px;
    padding: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .icon-bg-light {
    background: #F4FAF4;
    border-radius: 16px;
    padding: 12px;
    border: 1px solid #D0E8D2;
    display: flex;
    align-items: center;
    justify-content: center;
  }
</style>
