{% extends "base.html" %}

{% block content %}
<div class="container-fluid px-3 px-md-5 py-4" style="max-width: 800px; margin: 0 auto;">

    <div class="ropias-card p-4 p-md-5 mb-5 mt-3">
        <h4 class="font-body fw-bold mb-4 d-flex align-items-center gap-2 pb-2 border-bottom" style="color: var(--text-primary); border-color: var(--border) !important;">
            <i data-lucide="user" class="w-6 h-6 text-[var(--teal)]"></i> My Profile
        </h4>

        <form method="POST" action="{{ url_for('farmer.profile') }}" class="mt-4">
            
            <div class="row g-4 mb-4">
                <div class="col-12 col-md-6">
                    <label class="form-label font-body fw-medium" style="font-size: 14px; color: var(--text-muted);">Full Name</label>
                    <input type="text" class="form-control ropias-input" value="{{ current_user.full_name }}" disabled>
                    <div class="form-text mt-1 text-xs" style="color: var(--text-muted);">Contact administrator to modify.</div>
                </div>
                <div class="col-12 col-md-6">
                    <label class="form-label font-body fw-medium" style="font-size: 14px; color: var(--text-muted);">Phone Number</label>
                    <input type="text" name="phone" class="form-control ropias-input font-mono" value="{{ current_user.phone }}">
                </div>
            </div>

            <h5 class="font-body fw-bold mb-3 mt-5" style="color: var(--text-primary); font-size: 16px;">Farm Location</h5>
            <div class="row g-3 mb-4">
                <div class="col-6">
                    <label class="form-label font-body fw-medium" style="font-size: 13px; color: var(--text-muted);">Latitude</label>
                    <input type="number" step="any" name="latitude" id="latitude-input" class="form-control ropias-input font-mono" value="{{ current_user.farm_latitude or '' }}">
                </div>
                <div class="col-6">
                    <label class="form-label font-body fw-medium" style="font-size: 13px; color: var(--text-muted);">Longitude</label>
                    <input type="number" step="any" name="longitude" id="longitude-input" class="form-control ropias-input font-mono" value="{{ current_user.farm_longitude or '' }}">
                </div>
                <div class="col-12">
                    <button type="button" class="btn btn-ghost w-100 py-2 d-flex gap-2 justify-content-center" onclick="useMyGPS()">
                        <i data-lucide="map-pin" style="width:18px;"></i> Update with GPS
                    </button>
                </div>
            </div>

            <h5 class="font-body fw-bold mb-3 mt-5" style="color: var(--text-primary); font-size: 16px;">Alert Preferences</h5>
            <div class="d-flex align-items-center gap-3 mb-5 p-3 rounded" style="background-color: var(--bg-subtle);">
                <input class="form-check-input mt-0" type="checkbox" name="whatsapp_alerts" id="waCheck" style="width: 20px; height: 20px;" {% if current_user.whatsapp_alerts %}checked{% endif %}>
                <label class="form-check-label font-body" for="waCheck" style="color: var(--text-secondary); cursor: pointer;">
                    Receive automated Twilio WhatsApp alerts at 6:00 AM daily.
                </label>
            </div>

            <div class="d-flex gap-3 pt-3 border-top" style="border-color: var(--border) !important;">
                <button type="submit" class="btn btn-primary d-flex align-items-center gap-2 px-5 py-3 flex-grow-1 flex-md-grow-0">
                    <i data-lucide="save" class="w-4 h-4"></i> Save Changes
                </button>
            </div>

        </form>

    </div>

</div>
{% endblock %}
