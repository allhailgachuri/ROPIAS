<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROPIAS Admin | Onboard Farmer</title>
    <!-- Fonts & CSS -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/ropias.css') }}">
    <style>
        .admin-wrapper { max-width: 1400px; margin: 0 auto; padding-top: 2rem; }
        .dashboard-nav a { color: var(--navy); text-decoration: none; font-weight: 500; margin-right: 1.5rem; opacity: 0.7; transition: 0.2s; }
        .dashboard-nav a:hover, .dashboard-nav a.active { opacity: 1; font-weight: 600; border-bottom: 2px solid var(--teal); padding-bottom: 0.4rem; }
    </style>
</head>
<body style="background-color: #F5EFEB;">

<div class="admin-wrapper px-4 px-md-5 mb-5">
    
    <!-- Admin Navigation -->
    <header class="d-flex justify-content-between align-items-center pb-3 border-bottom mb-4">
        <div class="d-flex align-items-center gap-3">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="var(--teal)" class="bi bi-cloud-rain-fill" viewBox="0 0 16 16"><path d="M4.158 12.025a.5.5 0 0 1 .316.633l-.5 1.5a.5.5 0 0 1-.948-.316l.5-1.5a.5.5 0 0 1 .632-.317zm3 0a.5.5 0 0 1 .316.633l-1 3a.5.5 0 0 1-.948-.316l1-3a.5.5 0 0 1 .632-.317zm3 0a.5.5 0 0 1 .316.633l-.5 1.5a.5.5 0 0 1-.948-.316l.5-1.5a.5.5 0 0 1 .632-.317zm3 0a.5.5 0 0 1 .316.633l-1 3a.5.5 0 1 1-.948-.316l1-3a.5.5 0 0 1 .632-.317zm.247-6.998a5.001 5.001 0 0 0-9.499-1.004A3.5 3.5 0 1 0 3.5 11H13a3 3 0 0 0 .405-5.973z"/></svg>
            <h2 class="mb-0" style="font-family:'Playfair Display', serif; color: var(--navy);">Admin Console</h2>
        </div>
        <a href="{{ url_for('auth.logout') }}" class="btn btn-outline-danger btn-sm rounded-pill px-3">Logout</a>
    </header>

    <div class="dashboard-nav mb-5">
        <a href="{{ url_for('officer.dashboard') }}">Overview</a>
        <a href="{{ url_for('officer.farmer_list') }}" class="active">Farmers</a>
        <a href="{{ url_for('officer.alert_log') }}">Alerts & Messaging</a>
        <a href="{{ url_for('officer.analytics') }}">ML Analytics</a>
        <a href="{{ url_for('officer.system_status') }}">System Settings</a>
    </div>

    <!-- Onboard Farmer Form -->
    <div class="card border-0 shadow-sm rounded-4 overflow-hidden mb-5 mx-auto" style="max-width: 800px;">
        <div class="card-header bg-white border-bottom py-4 px-4 d-flex justify-content-between align-items-center">
            <h4 class="mb-0" style="font-family: 'Playfair Display', serif; color: var(--navy);"><i class="bi bi-person-plus-fill me-2 text-muted"></i>Onboard New Farmer</h4>
            <a href="{{ url_for('officer.farmer_list') }}" class="btn btn-sm btn-light border rounded-pill px-3">Back to List</a>
        </div>
        <div class="card-body p-5">
            <form method="POST" action="{{ url_for('officer.new_farmer') }}">
                <div class="row g-4 mb-4">
                    <div class="col-md-6">
                        <label class="form-label text-muted small">Full Name</label>
                        <input type="text" name="full_name" class="form-control premium-input" required placeholder="John Doe">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label text-muted small">Username (Auto-generated if blank)</label>
                        <input type="text" name="username" class="form-control premium-input" placeholder="john.doe">
                    </div>
                </div>

                <div class="row g-4 mb-4">
                    <div class="col-md-6">
                        <label class="form-label text-muted small">Email Address</label>
                        <input type="email" name="email" class="form-control premium-input" required placeholder="john@example.com">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label text-muted small">WhatsApp Phone Number</label>
                        <input type="text" name="phone" class="form-control premium-input" placeholder="+254700000000">
                    </div>
                </div>

                <div class="row g-4 mb-4">
                    <div class="col-md-6">
                        <label class="form-label text-muted small">Farm Latitude</label>
                        <input type="number" step="any" name="latitude" class="form-control premium-input" placeholder="-1.2921">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label text-muted small">Farm Longitude</label>
                        <input type="number" step="any" name="longitude" class="form-control premium-input" placeholder="36.8219">
                    </div>
                </div>

                <div class="row g-4 mb-5">
                    <div class="col-md-6">
                        <label class="form-label text-muted small">Preferred Crop</label>
                        <select name="crop" class="form-select premium-input">
                            <option value="maize">Maize</option>
                            <option value="beans">Beans</option>
                            <option value="sorghum">Sorghum</option>
                            <!-- Expansion handled dynamically if needed -->
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label text-muted small">Initial Password</label>
                        <input type="text" name="password" class="form-control premium-input" required placeholder="Temporary Password">
                    </div>
                </div>

                <button type="submit" class="btn btn-navy w-100 py-3 rounded-3 fw-bold fs-5">Create Farmer Profile</button>
            </form>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
