<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROPIAS | Crop Reference Library</title>
    <!-- Bootstrap grid & utilities -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/ropias.css">
</head>
<body>

<div class="container pt-4 pb-5">
    
    <header class="d-flex justify-content-between align-items-center mb-4">
        <div class="app-brand d-flex align-items-center gap-2">
            <i class="fa-solid fa-cloud-sun-rain" style="color: var(--teal); font-size: 1.5rem;"></i> 
            <span class="wordmark" style="font-size: 1.8rem; text-decoration: none;">ROPIAS</span>
        </div>
        <a href="/" class="btn btn-outline-secondary btn-sm" style="border-radius: 20px;"><i class="fa-solid fa-arrow-left"></i> Back to Dashboard</a>
    </header>

    <div class="hero mb-5" style="border-bottom: 2px solid var(--color-border); padding-bottom: 2rem; text-align: left;">
        <h1 style="color: var(--navy); font-size: 2.8rem; margin-bottom: 0.5rem;"><i class="fa-solid fa-book-open" style="color: var(--teal);"></i> Crop Reference Library</h1>
        <p style="color: var(--color-text-secondary); font-size: 1.2rem;">Agronomic baseline configurations driving ROPIAS algorithms.</p>
    </div>

    <div id="crop-grid">
        <div class="text-center text-muted" id="crop-loading">
            <div class="spinner d-block"></div>Loading agricultural database...
        </div>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", async () => {
    try {
        const res = await fetch('/api/crops');
        const data = await res.json();
        
        const grid = document.getElementById('crop-grid');
        grid.innerHTML = '';
        
        for (const [category, crops] of Object.entries(data.categories)) {
            const catSection = document.createElement('div');
            catSection.className = 'mb-5';
            catSection.innerHTML = `<h3 style="color: var(--navy); border-bottom: 1px solid var(--color-border); padding-bottom: 0.5rem; margin-bottom: 1.5rem;">${category}</h3>`;
            
            const row = document.createElement('div');
            row.className = 'row g-4';
            
            crops.forEach(crop => {
                row.innerHTML += `
                    <div class="col-12 col-md-6 col-lg-4">
                        <div class="glass-card h-100" style="padding: 1.5rem;">
                            <span class="crop-badge">${crop.category}</span>
                            <h4 style="color: var(--navy); margin-bottom: 0.2rem;">${crop.display_name}</h4>
                            <p class="small text-muted mb-3">${crop.description}</p>
                            
                            <hr style="border-color: var(--color-border);">
                            
                            <div class="small" style="color: var(--color-text-primary);">
                                <div class="mb-1"><i class="fa-solid fa-cloud-showers-heavy text-primary" style="opacity: 0.6; width: 20px;"></i> <strong>Onset:</strong> ${crop.onset_threshold_mm}mm in ${crop.onset_window_days} days</div>
                                <div class="mb-1"><i class="fa-solid fa-droplet text-info" style="opacity: 0.6; width: 20px;"></i> <strong>Critical Moisture:</strong> ${Math.round(crop.critical_moisture*100)}%</div>
                                <div class="mb-1"><i class="fa-solid fa-check text-success" style="opacity: 0.6; width: 20px;"></i> <strong>Optimal Range:</strong> ${Math.round(crop.optimal_moisture_min*100)}% - ${Math.round(crop.optimal_moisture_max*100)}%</div>
                                <div class="mb-1"><i class="fa-solid fa-leaf text-success" style="opacity: 0.6; width: 20px;"></i> <strong>Sensitive Stages:</strong> ${crop.water_sensitive_stages.join(', ').replace(/_/g, ' ')}</div>
                                <div><i class="fa-solid fa-calendar text-warning" style="opacity: 0.6; width: 20px;"></i> <strong>Seasons:</strong> ${crop.planting_season.join(', ').replace(/_/g, ' ')}</div>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            catSection.appendChild(row);
            grid.appendChild(catSection);
        }
        
    } catch(e) {
        document.getElementById('crop-loading').innerHTML = `<span class="text-danger"><i class="fa-solid fa-triangle-exclamation"></i> Failed to load crop database.</span>`;
    }
});
</script>

</body>
</html>
