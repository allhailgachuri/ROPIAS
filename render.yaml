services:
  - type: web
    name: ropias
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn -w 4 -b 0.0.0.0:$PORT --timeout 120 run:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8
      - key: DATABASE_URL
        fromDatabase:
          name: ropias-db
          property: connectionString
    healthCheckPath: /health

databases:
  - name: ropias-db
    databaseName: ropias
    plan: free
