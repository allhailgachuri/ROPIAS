services:
  - type: web
    name: ropias
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn -w 4 -b 0.0.0.0:10000 --timeout 120 app.app:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8
      - key: DATABASE_URL
        value: sqlite:////tmp/ropias.db # Free tier ephemeral storage
    healthCheckPath: /health
